<!doctype html>
<html lang="en" class="preload">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>ViennaBase19 - Facility Booking</title>
		<style>
			html {
				background: linear-gradient(135deg, #faf5ff 0%, #fdf2f8 50%, #fff7ed 100%);
			}

			html.preload body {
				opacity: 0;
				visibility: hidden;
			}

			body {
				margin: 0;
				min-height: 100vh;
				background: linear-gradient(135deg, #faf5ff 0%, #fdf2f8 50%, #fff7ed 100%);
				opacity: 1;
				transition: opacity 120ms ease-out;
			}
		</style>
		<noscript>
			<style>
				html.preload body {
					opacity: 1;
					visibility: visible;
				}
			</style>
		</noscript>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
